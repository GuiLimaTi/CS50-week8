<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>

        <script>
            document.addEventListener("DOMContentLoaded", function()
            {
                // Part 1: Multiple choice
                let correct = document.querySelector(".correct");
                let incorrects = document.querySelectorAll(".incorrect");

                correct.addEventListener("click", function()
                {
                    correct.style.backgroundColor = "green";
                    document.querySelector("#part1-result").innerHTML = "Correct!";
                });

                for (let i = 0; i < incorrects.length; i++)
                {
                    incorrects[i].addEventListener("click", function()
                    {
                        incorrects[i].style.backgroundColor = "red";
                        document.querySelector("#part1-result").innerHTML = "Incorrect";
                    });
                }

                // Part 2: Free response
                document.querySelector("#check-answer").addEventListener("click", function()
                {
                    let input = document.querySelector("#free-response");

                    if (input.value.trim().toLowerCase() === "dublin")
                    {
                        input.style.backgroundColor = "green";
                        document.querySelector("#part2-result").innerHTML = "Correct!";
                    }
                    else
                    {
                        input.style.backgroundColor = "red";
                        document.querySelector("#part2-result").innerHTML = "Incorrect";
                    }
                });
            });
        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice</h2>
                <hr>

                <h3>What is the best university in the world?</h3>

                <button class="incorrect">Yale</button>
                <button class="correct">Harvard</button>
                <button class="incorrect">Princeton</button>
                <button class="incorrect">Stanford</button>

                <p id="part1-result"></p>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>

                <h3>What is the capital city of Ireland?</h3>

                <input type="text" id="free-response" placeholder="Your answer">
                <button id="check-answer">Check Answer</button>

                <p id="part2-result"></p>
            </div>
        </div>
    </body>
</html>
